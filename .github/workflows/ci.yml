name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Ship cadence here is many pushes a day — a superseded run is pure wasted minutes.
# Cancel the in-flight run when a newer push to the same ref lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # A wedged run would otherwise burn the 360-minute default against the monthly quota.
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test
        env:
          # DB creds for the RLS-isolation + billing-invariant integration tests
          # (rls.integration.test.ts / billing.integration.test.ts). They self-skip
          # without these — tests/ci-guard.test.ts fails the run if they're missing
          # in CI, so the skip can never be silent again.
          TEST_DB_HOST: ${{ secrets.TEST_DB_HOST }}
          TEST_DB_USER: ${{ secrets.TEST_DB_USER }}
          TEST_DBPW: ${{ secrets.TEST_DBPW }}

      - name: Build
        run: npm run build
        env:
          # Builds don't need real secrets (all data pages are dynamic), but a
          # couple of public vars keep the client bundle happy.
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: build-placeholder
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
